<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Auto Fill Timer</title>
</head>
<body>
  <script>
    const COMPONENT_READY = "streamlit:componentReady";
    const SET_COMPONENT_VALUE = "streamlit:setComponentValue";
    const SET_FRAME_HEIGHT = "streamlit:setFrameHeight";
    const RENDER_EVENT = "streamlit:render";
    const API_VERSION = 1;

    let activeTimer = null;
    let lastArmedToken = null;

    function sendMessage(type, data) {
      window.parent.postMessage(
        {
          isStreamlitMessage: true,
          type,
          ...data,
        },
        "*",
      );
    }

    function armTimer(args) {
      const enabled = Boolean(args.enabled);
      const delayMs = Math.max(parseInt(args.delay_seconds || 0, 10), 1) * 1000;
      const nextPhase = String(args.next_phase || "display");
      const cycleToken = String(args.cycle_token || "");
      if (!enabled || !cycleToken) {
        if (activeTimer !== null) {
          clearTimeout(activeTimer);
          activeTimer = null;
        }
        lastArmedToken = null;
        return;
      }
      if (lastArmedToken === cycleToken) {
        return;
      }
      lastArmedToken = cycleToken;
      if (activeTimer !== null) {
        clearTimeout(activeTimer);
      }
      activeTimer = window.setTimeout(() => {
        sendMessage(SET_COMPONENT_VALUE, {
          value: {
            cycle_token: cycleToken,
            next_phase: nextPhase,
            fired_at_ms: Date.now(),
          },
          dataType: "json",
        });
      }, delayMs);
    }

    window.addEventListener("message", (event) => {
      const message = event.data || {};
      if (message.type !== RENDER_EVENT) {
        return;
      }
      const args = message.args || {};
      armTimer(args);
      sendMessage(SET_FRAME_HEIGHT, { height: 0 });
    });

    sendMessage(COMPONENT_READY, { apiVersion: API_VERSION });
    sendMessage(SET_FRAME_HEIGHT, { height: 0 });
  </script>
</body>
</html>
